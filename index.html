<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>了解自己的頭皮問題，才能對症下藥！</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #FAF7F2;
      --ink:    #1A1714;
      --blush:  #D4A5A0;
      --sage:   #8A9E8C;
      --warm:   #C8956C;
      --muted:  #7A746E;
      --card:   #FFFFFF;
      --border: #EAE4DD;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      overflow-y: auto;
      opacity: 1;
      transform: translateX(0);
      transition: opacity 0.35s ease, transform 0.35s ease;
      will-change: opacity, transform;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: translateX(28px);
    }

    /* ── COVER ── */
    #cover { align-items: stretch; }

    .cover-hero {
      width: 100%;
      height: 52vw; max-height: 280px;
      background: linear-gradient(145deg, #C8B8A2 0%, #7E6658 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 88px;
      flex-shrink: 0;
    }
    /* Swap emoji for a real image:
       <img src="your-cover.jpg" class="cover-hero" style="object-fit:cover;" /> */

    .cover-body {
      flex: 1; padding: 32px 24px 40px;
      display: flex; flex-direction: column; align-items: flex-start;
    }
    .eyebrow {
      font-size: 10px; font-weight: 500; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--warm); margin-bottom: 10px;
    }
    .cover-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 9vw, 46px); font-weight: 700; line-height: 1.08;
      margin-bottom: 12px;
    }
    .cover-sub {
      font-size: 14px; line-height: 1.65; color: var(--muted);
      max-width: 310px; margin-bottom: 32px;
    }
    .cover-meta {
      display: flex; gap: 20px; margin-bottom: 32px;
    }
    .cover-meta-item {
      display: flex; flex-direction: column; gap: 3px;
    }
    .cover-meta-item .val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 700; color: var(--ink);
    }
    .cover-meta-item .lbl {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }
    .btn-primary {
      align-self: stretch;
      background: var(--ink); color: var(--cream);
      border: none; border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 17px 40px;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:active { background: #3A3530; transform: scale(0.98); }

    /* ── QUESTION ── */
    #question { align-items: stretch; }

    .q-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 10px;
      flex-shrink: 0;
    }
    .q-progress-track {
      flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .q-progress-fill {
      height: 100%; background: var(--warm); border-radius: 99px;
      transition: width 0.45s cubic-bezier(.4,0,.2,1);
    }
    .q-step-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      white-space: nowrap; letter-spacing: 0.04em;
    }

    .q-image {
      width: 100%; height: 44vw; max-height: 220px;
      background: linear-gradient(135deg, #D4C4B4 0%, #9E8878 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 62px; flex-shrink: 0; overflow: hidden;
    }
    /* To use a real image per question, set background-image or use <img> */

    .q-body { flex: 1; padding: 22px 20px 108px; }

    .q-counter {
      font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--warm); margin-bottom: 6px;
    }
    .q-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 5.5vw, 28px); font-weight: 600; line-height: 1.22;
      margin-bottom: 22px;
    }

    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .option-btn {
      background: var(--card);
      border: 1.5px solid var(--border); border-radius: 6px;
      padding: 14px 12px; text-align: left; cursor: pointer;
      transition: border-color 0.18s, background 0.18s, transform 0.12s;
      display: flex; flex-direction: column; gap: 5px;
    }
    .option-btn:active { transform: scale(0.97); }
    .opt-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .opt-text {
      font-size: 13px; line-height: 1.4; color: var(--ink);
    }
    .option-btn.selected {
      border-color: var(--warm); background: #FDF5EF;
    }
    .option-btn.selected .opt-label { color: var(--warm); }

    /* sticky nav */
    .q-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--cream); border-top: 1px solid var(--border);
      padding: 12px 16px 16px; display: flex; gap: 10px;
      z-index: 10;
    }
    .btn-ghost {
      flex: 1; background: transparent;
      border: 1.5px solid var(--ink); border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 14px; cursor: pointer; color: var(--ink);
    }
    .btn-ghost:active { background: var(--border); }
    .btn-next {
      flex: 2.5; background: var(--ink); color: var(--cream);
      border: none; border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 14px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-next:disabled { opacity: 0.32; cursor: default; }

    /* ── RESULT ── */
    #result { align-items: stretch; }

    .result-header {
      background: var(--ink); color: var(--cream);
      padding: 44px 24px 32px; text-align: center; flex-shrink: 0;
    }
    .result-header .eyebrow { color: var(--blush); margin-bottom: 10px; }
    .result-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 7.5vw, 40px); font-weight: 700; line-height: 1.1;
      margin-bottom: 8px;
    }
    .result-header p { font-size: 13px; color: #B0A89F; line-height: 1.6; }

    .result-count-bar {
      background: #241F1C; color: var(--blush);
      padding: 10px 24px; text-align: center;
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .products-list {
      flex: 1; padding: 20px; display: flex; flex-direction: column;
      gap: 14px; padding-bottom: 36px;
    }

    .product-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; display: flex; align-items: center;
      gap: 16px; padding: 16px;
      opacity: 0; animation: slideUp 0.4s ease forwards;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .product-img {
      width: 80px; height: 80px; min-width: 80px;
      border-radius: 6px; overflow: hidden;
      background: linear-gradient(135deg, #DDD0C4 0%, #B0988A 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
    }
    /* To use real image: <img src="…" style="width:80px;height:80px;object-fit:cover;border-radius:6px;" /> */

    .product-info { flex: 1; min-width: 0; }
    .product-tag {
      font-size: 10px; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--sage); margin-bottom: 4px;
    }
    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 600; line-height: 1.2;
      margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-buy {
      display: inline-block;
      background: var(--warm); color: #fff;
      border: none; border-radius: 2px; text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 9px 16px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-buy:active { background: #AD7A54; }

    .retake-wrap { padding: 0 20px 48px; }
    .btn-retake {
      width: 100%; background: transparent;
      border: 1.5px solid var(--ink); border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 16px; cursor: pointer; color: var(--ink);
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     COVER
══════════════════════════════════════ -->
<div id="cover" class="screen">

<!-- ══════════════════════════════════════
     QUESTION
══════════════════════════════════════ -->
<div id="question" class="screen hidden">

    <div class="q-progress-track">
      <div class="q-progress-fill" id="progressFill"></div>
    </div>
    <span class="q-step-label" id="qStepLabel"></span>

  <div class="q-nav">
    <button class="btn-ghost" id="btnPrev" onclick="prevQuestion()">← 返回</button>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()" disabled>繼續 →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     RESULT
══════════════════════════════════════ -->
<div id="result" class="screen hidden">
  <div class="result-header">
    <div class="eyebrow">您的專屬儀式</div>
    <h1>您的專屬髮品推薦</h1>
    <p>根據您的答案，為您精心挑選</p>
  </div>
  <div class="result-count-bar" id="resultCountBar"></div>
  <div class="products-list" id="productsList"></div>
  <div class="retake-wrap">
    <button class="btn-retake" onclick="retakeQuiz()">再一次</button>
  </div>
</div>

  {

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentQ = 0;
let answers  = new Array(QUESTIONS.length).fill(null); // stores chosen option index per Q

// ── Helpers ──────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  // scroll to top for screens that overflow
  document.getElementById(id).scrollTop = 0;
}

// ── COVER ────────────────────────────────────────────────────
function startQuiz() {
  currentQ = 0;
  answers.fill(null);
  renderQuestion();
  show('question');
}

// ── QUESTION ─────────────────────────────────────────────────
function renderQuestion() {
  const q      = QUESTIONS[currentQ];
  const total  = QUESTIONS.length;
  const pct    = (currentQ / total) * 100;

  // progress
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qStepLabel').textContent   = `${currentQ + 1} / ${total}`;

  // illustration
  document.getElementById('qImage').textContent = q.emoji;
  // If using real images per question, do:
  // document.getElementById('qImage').style.backgroundImage = `url('${q.image}')`;

  // text
  // document.getElementById('qCounter').textContent = `Question ${currentQ + 1} of ${total}`;
  document.getElementById('qCounter').textContent = `第 ${currentQ + 1} 題，共 ${total} 題`;
  document.getElementById('qTitle').textContent   = q.title;

  // options
  const grid   = document.getElementById('optionsGrid');
  const labels = ['A', 'B', 'C', 'D'];
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `
      <span class="opt-label">${labels[i]}</span>
      <span class="opt-text">${opt.text}</span>`;
    btn.onclick = () => selectOption(i);
    grid.appendChild(btn);
  });

  // nav state
  const isFirst = currentQ === 0;
  const isLast  = currentQ === total - 1;

  const btnPrev = document.getElementById('btnPrev');
  btnPrev.style.display = isFirst ? 'none' : 'block';

  const btnNext = document.getElementById('btnNext');
  btnNext.disabled    = answers[currentQ] === null;
  // btnNext.textContent = isLast ? 'See My Results →' : 'Continue →';
  btnNext.textContent = isLast ? '查看結果 →' : '繼續 →';
}

function selectOption(i) {
  answers[currentQ] = i;
  document.querySelectorAll('.option-btn').forEach((b, idx) =>
    b.classList.toggle('selected', idx === i)
  );
  document.getElementById('btnNext').disabled = false;
}

function nextQuestion() {
  if (answers[currentQ] === null) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
  else show('cover');
}

// ── RESULT ───────────────────────────────────────────────────
function showResult() {
  const seen        = new Set();
  const recommended = [];

  QUESTIONS.forEach((q, qi) => {
    if (answers[qi] !== null) {
      const products = q.options[answers[qi]].product;
      const pids = Array.isArray(products) ? products : [products];
      pids.forEach(pid => {
        if (pid && !seen.has(pid)) {
          seen.add(pid);
          recommended.push(pid);
        }
      });
    }
  });

  // count bar
  const noun = recommended.length === 1 ? 'product' : 'products';
  // document.getElementById('resultCountBar').textContent =
    // `${recommended.length} ${noun} matched to your hair profile`;
  document.getElementById('resultCountBar').textContent =
    `${recommended.length} 款符合您髮質的產品`;

  // product cards
  const list = document.getElementById('productsList');
  list.innerHTML = '';

  recommended.forEach((pid, idx) => {
    const p    = PRODUCTS[pid];
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = (idx * 0.08 + 0.04) + 's';
    card.innerHTML = renderProductCard(p);
    list.appendChild(card);
  });

  show('result');
}

function renderProductCard(p) {
  const imgHTML = p.image
    ? `<img src="${p.image}" style="width:80px;height:80px;border-radius:6px;object-fit:cover;" />`
    : `<div class="product-img">${p.emoji}</div>`;

  return `
    ${imgHTML}
    <div class="product-info">
      <div class="product-tag">${p.tag}</div>
      <div class="product-name">${p.name}</div>
      <a class="btn-buy" href="${p.storeUrl}" target="_blank">立即購買</a>
    </div>`;
}

function retakeQuiz() {
  answers.fill(null);
  currentQ = 0;
  renderQuestion();
  show('question');
}
